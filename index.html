<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAP vs REST Karşılaştırma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; }
        header h1 { color: #4fc3f7; font-size: 1.8em; }
        header p { color: #90a4ae; margin-top: 5px; }

        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .input-box { background: #1e2a38; border-radius: 8px; padding: 15px; border: 1px solid #2d3e50; }
        .input-box h3 { color: #4fc3f7; margin-bottom: 10px; font-size: 1em; }
        textarea { width: 100%; height: 250px; background: #0d1520; border: 1px solid #2d3e50; border-radius: 6px; padding: 10px; color: #e0e0e0; font-family: Consolas, monospace; font-size: 11px; resize: vertical; }
        textarea:focus { outline: none; border-color: #4fc3f7; }

        .btn-section { text-align: center; margin: 15px 0; }
        button { padding: 12px 30px; font-size: 1em; border: none; border-radius: 6px; cursor: pointer; margin: 0 5px; font-weight: 600; }
        .btn-compare { background: linear-gradient(135deg, #4fc3f7, #2196f3); color: white; }
        .btn-compare:hover { box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4); }
        .btn-clear { background: #37474f; color: #90a4ae; }
        .btn-export { background: linear-gradient(135deg, #66bb6a, #43a047); color: white; display: none; }
        .btn-export:hover { box-shadow: 0 4px 15px rgba(102, 187, 106, 0.4); }
        .btn-export:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        .loading { text-align: center; padding: 20px; color: #4fc3f7; display: none; }
        .error { background: #c62828; color: white; padding: 12px; border-radius: 6px; margin: 15px 0; display: none; }

        .results { background: #1e2a38; border-radius: 8px; padding: 20px; margin-top: 20px; display: none; }

        .summary-box { background: #0d1520; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .summary-box h3 { color: #4fc3f7; margin-bottom: 15px; }
        .summary-stats { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .stat { text-align: center; padding: 15px 25px; background: #1e2a38; border-radius: 8px; }
        .stat-value { display: block; font-size: 2em; font-weight: bold; color: #4fc3f7; }
        .stat.same .stat-value { color: #4caf50; }
        .stat.diff .stat-value { color: #f44336; }
        .stat-label { color: #90a4ae; font-size: 0.85em; margin-top: 3px; display: block; }

        .export-section { text-align: center; margin-top: 15px; padding: 15px; background: #0d1520; border-radius: 8px; display: none; }
        .export-status { margin-top: 10px; font-size: 0.9em; }
        .export-status a { color: #4fc3f7; text-decoration: none; font-weight: 600; }
        .export-status a:hover { text-decoration: underline; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #2d3e50; padding-bottom: 8px; flex-wrap: wrap; }
        .tab-btn { background: transparent; color: #90a4ae; padding: 8px 20px; border-radius: 4px 4px 0 0; font-size: 0.9em; }
        .tab-btn.active { background: #2d3e50; color: #4fc3f7; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; background: #0d1520; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        th { background: #2f5496; color: white; padding: 10px 12px; text-align: left; font-size: 0.9em; }
        td { padding: 8px 12px; border-bottom: 1px solid #2d3e50; font-size: 0.85em; word-break: break-word; }
        tr.same { background: rgba(76, 175, 80, 0.1); }
        tr.diff { background: rgba(244, 67, 54, 0.15); }
        .field-name { font-weight: 600; color: #4fc3f7; width: 22%; }
        .value { font-family: Consolas, monospace; max-width: 300px; }
        .status { text-align: center; width: 80px; font-weight: 600; }
        .status.same { color: #4caf50; }
        .status.diff { color: #f44336; }

        .doc-section { background: #0d1520; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 3px solid #4fc3f7; }
        .doc-section h4 { color: #4fc3f7; margin-bottom: 12px; font-size: 1em; }
        .doc-section h5 { color: #90a4ae; margin: 12px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #2d3e50; font-size: 0.9em; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7em; margin-left: 8px; }
        .badge.ok { background: #4caf50; color: white; }
        .badge.warn { background: #ff9800; color: white; }
        .no-data { color: #90a4ae; font-style: italic; padding: 15px; text-align: center; }

        @media (max-width: 800px) { .input-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 SOAP vs REST Karşılaştırma Aracı</h1>
            <p>AS-IS (SOAP XML) ve TO-BE (REST JSON) servis çıktılarını karşılaştırın</p>
        </header>

        <div class="input-section">
            <div class="input-box">
                <h3>📥 AS-IS (SOAP XML)</h3>
                <textarea id="soap-input" placeholder="SOAP XML içeriğini buraya yapıştırın..."></textarea>
            </div>
            <div class="input-box">
                <h3>📥 TO-BE (REST JSON)</h3>
                <textarea id="rest-input" placeholder="REST JSON içeriğini buraya yapıştırın..."></textarea>
            </div>
        </div>

        <div class="btn-section">
            <button class="btn-compare" onclick="compare()">🔍 Karşılaştır</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ Temizle</button>
            <button id="btn-export" class="btn-export" onclick="exportToExcel()">📊 Excel'e Aktar</button>
        </div>

        <div id="loading" class="loading">⏳ Karşılaştırılıyor...</div>
        <div id="error" class="error"></div>

        <div id="results" class="results">
            <div id="summary" class="summary-box"></div>
            
            <div id="export-section" class="export-section">
                <span id="export-status" class="export-status"></span>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('top-level')">🔝 Üst Seviye</button>
                <button class="tab-btn" onclick="showTab('customer')">👤 Müşteri</button>
                <button class="tab-btn" onclick="showTab('documents')">📄 Dokümanlar</button>
            </div>
            <div id="top-level" class="tab-content active"></div>
            <div id="customer" class="tab-content"></div>
            <div id="documents" class="tab-content"></div>
        </div>
    </div>

    <script>
        let lastComparisonData = null;
        let lastRestData = null;

        async function compare() {
            const soap = document.getElementById('soap-input').value;
            const rest = document.getElementById('rest-input').value;
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');
            const btnExport = document.getElementById('btn-export');
            const exportSection = document.getElementById('export-section');

            error.style.display = 'none';
            results.style.display = 'none';
            btnExport.style.display = 'none';
            exportSection.style.display = 'none';
            loading.style.display = 'block';

            lastComparisonData = null;
            lastRestData = null;

            try {
                const resp = await fetch('/compare', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'soap=' + encodeURIComponent(soap) + '&rest=' + encodeURIComponent(rest)
                });
                const data = await resp.json();
                loading.style.display = 'none';

                if (data.error) {
                    error.textContent = '❌ ' + data.error;
                    error.style.display = 'block';
                    return;
                }

                lastComparisonData = data;
                lastRestData = data.restData || {};

                displayResults(data);
                results.style.display = 'block';
                
                btnExport.style.display = 'inline-block';
                exportSection.style.display = 'block';
                document.getElementById('export-status').innerHTML = '💡 Karşılaştırma tamamlandı. Excel\'e aktarabilirsiniz.';

            } catch (e) {
                loading.style.display = 'none';
                error.textContent = '❌ Hata: ' + e.message;
                error.style.display = 'block';
            }
        }

        async function exportToExcel() {
            if (!lastComparisonData) {
                alert('Önce karşılaştırma yapmalısınız!');
                return;
            }

            const btn = document.getElementById('btn-export');
            const status = document.getElementById('export-status');

            btn.disabled = true;
            btn.innerHTML = '⏳ Aktarılıyor...';
            status.innerHTML = '⏳ Excel dosyası oluşturuluyor...';

            try {
                const resp = await fetch('/export-excel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        comparison_data: lastComparisonData,
                        rest_data: lastRestData
                    })
                });
                const data = await resp.json();

                if (data.success) {
                    status.innerHTML = '✅ Başarılı! <a href="/download/' + encodeURIComponent(data.filename) + '" download>📥 İndir: ' + data.filename + '</a>';
                } else {
                    status.innerHTML = '❌ Hata: ' + data.error;
                }
            } catch (e) {
                status.innerHTML = '❌ Hata: ' + e.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📊 Excel\'e Aktar';
            }
        }

        function displayResults(data) {
            const s = data.summary;
            const pct = s.total > 0 ? ((s.diff / s.total) * 100).toFixed(1) : 0;
            document.getElementById('summary').innerHTML = `
                <h3>📊 Özet</h3>
                <div class="summary-stats">
                    <div class="stat"><span class="stat-value">${s.total}</span><span class="stat-label">Toplam Alan</span></div>
                    <div class="stat same"><span class="stat-value">${s.same}</span><span class="stat-label">✅ Aynı</span></div>
                    <div class="stat diff"><span class="stat-value">${s.diff}</span><span class="stat-label">❌ Farklı</span></div>
                    <div class="stat"><span class="stat-value">${pct}%</span><span class="stat-label">Fark Oranı</span></div>
                </div>`;

            document.getElementById('top-level').innerHTML = '<h4>Üst Seviye Alanlar</h4>' + makeTable(data.topLevel);
            document.getElementById('customer').innerHTML = '<h4>Müşteri Bilgileri</h4>' + makeTable(data.customer);

            let docHtml = '';
            data.documents.forEach(doc => {
                const badge = doc.inSoap && doc.inRest ? '<span class="badge ok">Her İkisinde</span>'
                    : doc.inSoap ? '<span class="badge warn">Sadece SOAP</span>' : '<span class="badge warn">Sadece REST</span>';
                docHtml += `<div class="doc-section"><h4>📄 ${esc(doc.name)} (${esc(doc.code)}) ${badge}</h4>`;
                if (doc.inSoap && doc.inRest) {
                    if (doc.meta.length) docHtml += '<h5>Meta Bilgileri</h5>' + makeTable(doc.meta);
                    if (doc.templateFields.length) docHtml += '<h5>Template Fields</h5>' + makeTable(doc.templateFields);
                    if (doc.indexes.length) docHtml += '<h5>Document Indexes</h5>' + makeTable(doc.indexes);
                }
                docHtml += '</div>';
            });
            document.getElementById('documents').innerHTML = docHtml || '<p class="no-data">Doküman bulunamadı</p>';
        }

        function makeTable(rows) {
            if (!rows || !rows.length) return '<p class="no-data">Veri yok</p>';
            let h = '<table><thead><tr><th>Alan Adı</th><th>AS-IS (SOAP)</th><th>TO-BE (REST)</th><th>Durum</th></tr></thead><tbody>';
            rows.forEach(r => {
                const cls = r.status === 'same' ? 'same' : 'diff';
                const st = r.status === 'same' ? '✅' : '❌';
                h += `<tr class="${cls}"><td class="field-name">${esc(r.field)}</td><td class="value">${esc(r.soap)}</td><td class="value">${esc(r.rest)}</td><td class="status ${cls}">${st}</td></tr>`;
            });
            return h + '</tbody></table>';
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        function clearAll() {
            document.getElementById('soap-input').value = '';
            document.getElementById('rest-input').value = '';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('btn-export').style.display = 'none';
            lastComparisonData = null;
            lastRestData = null;
        }
    </script>
</body>
</html>
